name: US Stock Screener

on:
  schedule:
    - cron: '30 21 * * 1-5' # 미주 장마감 후 자동 실행 (UTC 21:30 = 한국 시간 새벽 6시 30분)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  screen_and_email:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas lxml requests openpyxl cryptography

    - name: Run Screener Script
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: |
        python main.py
